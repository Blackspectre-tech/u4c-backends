<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>U4C Verification</title>
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #fdfbf7;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #fdfbf7;">
    <tr>
      <td align="center" style="padding: 50px 20px;">
        
        <!-- Wrapper for perfect clipping -->
        <div style="max-width: 540px; background-color: #ffffff; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #f0eee9; overflow: hidden;">
          <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #ffffff; border-collapse: collapse;">
            <tr>
              <td style="padding: 40px 40px 10px 40px;" align="center">
                <img src="https://backend.united-4-change.org/static/u4c.png" alt="U4C" style="width: 140px; height: auto;">
              </td>
            </tr>
            <tr>
              <td style="padding: 20px 40px 40px 40px; text-align: center;">
                <h1 style="font-size: 28px; font-weight: 800; color: #111; margin-bottom: 16px; letter-spacing: -0.5px;">{{title}}</h1>
                <div style="font-size: 16px; line-height: 1.6; color: #555; margin-bottom: 30px;">{{message|linebreaks}}</div>

                {% if otp %}
                <!-- OTP Box -->
                <div style="padding: 30px; background-color: #faf9f6; border-radius: 16px; border: 1px dashed #dcdad5;">
                  <span style="display: block; font-size: 12px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px;">Verification Code</span>
                  <span style="font-size: 42px; font-weight: 800; color: #000; letter-spacing: 8px; font-family: 'SF Mono', Monaco, monospace;">{{ otp }}</span>
                  <p style="font-size: 13px; color: #888; margin-top: 15px; margin-bottom: 0;">Expires in 5 minutes</p>
                </div>
                {% endif %}

                {% if link %}
                <div style="margin-top: 30px;">
                  <a href="{{link}}" style="display: inline-block; padding: 16px 32px; background-color: #000; color: #fff; text-decoration: none; border-radius: 12px; font-weight: 600; font-size: 16px;">Activate Now</a>
                </div>
                {% endif %}

                {% if support %}
                <p style="font-size: 14px; color: #777; margin-top: 40px; border-top: 1px solid #f4f4f4; padding-top: 20px;">
                  Questions? <a href="https://united-4-change.org/contact-us" style="color: #007bff; text-decoration: none; font-weight: 500;">Contact support team &rarr;</a>
                </p>
                {% endif %}
              </td>
            </tr>
            
            <!-- Perfect Rainbow Edge -->
            <tr>
              <td style="height: 12px; font-size: 1px; line-height: 1px; background: linear-gradient(to right, #ff0000, #ffa500, #00bcd4);">
                &nbsp;
              </td>
            </tr>
          </table>
        </div>
        
        <p style="font-size: 12px; color: #aaa; margin-top: 30px; text-align: center;">&copy; {{ year }} United 4 Change &bull; All rights reserved</p>
      </td>
    </tr>
  </table>
</body>
</html>
